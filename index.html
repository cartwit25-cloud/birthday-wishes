<html lang="zh-TW">

<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{--cream:#F5F0E8;--ink:#2C2416;--ink-l:#6B5E4A;--ink-f:#A8997E;--gold:#C4963A;--gold-l:#E8C97A;--gold-p:#F5EDD0;--border:#D9CEB8;--white:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;padding:40px 20px;}
.page{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:32px;}
.header{text-align:center;}
.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.header h1{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:300;letter-spacing:.08em;}
.hline{width:36px;height:1px;background:var(--gold);margin:14px auto 0;}
.section-label{font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.top-section{display:flex;gap:24px;align-items:flex-start;}
.cal-wrap{flex:1;min-width:0;}
.cal-card{background:var(--white);border:1px solid var(--border);padding:20px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:400;letter-spacing:.06em;}
.cal-nav{background:transparent;border:1px solid var(--border);color:var(--ink-l);font-size:14px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-nav:hover{border-color:var(--gold);color:var(--gold);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:11px;color:var(--ink-f);text-align:center;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;border:1px solid transparent;transition:all .15s;}
.cal-day:hover{background:var(--gold-p);border-color:var(--border);}
.cal-day.today{font-weight:500;color:var(--gold);}
.cal-day.has-holiday .dot{width:4px;height:4px;background:var(--gold);border-radius:50%;position:absolute;bottom:3px;}
.cal-day.selected{background:var(--gold-p);border-color:var(--gold);}
.cal-day.empty{cursor:default;pointer-events:none;}
.holiday-popup{margin-top:12px;padding:12px 16px;background:var(--gold-p);border:1px solid var(--border);font-size:13px;color:var(--ink-l);line-height:1.8;min-height:44px;}
.hday-name{color:var(--gold);font-weight:500;font-size:14px;}
.use-btn{padding:4px 10px;background:var(--ink);color:var(--cream);border:none;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:.06em;cursor:pointer;margin-left:8px;}
.use-btn:hover{background:var(--gold);color:var(--ink);}
.search-wrap{width:240px;flex-shrink:0;}
.panel{background:var(--white);border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:12px;}
.panel-title{font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;}
.search-input{background:var(--cream);border:1px solid var(--border);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:13px;padding:7px 10px;outline:none;width:100%;border-radius:0;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}
.holiday-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.holiday-list::-webkit-scrollbar{width:4px;}
.holiday-list::-webkit-scrollbar-thumb{background:var(--border);}
.hitem{padding:7px 10px;font-size:13px;cursor:pointer;color:var(--ink-l);border:1px solid transparent;transition:all .12s;}
.hitem:hover{background:var(--gold-p);border-color:var(--border);color:var(--ink);}
.hitem.selected{background:var(--gold-p);border-color:var(--gold);color:var(--ink);}
.hitem-date{font-size:11px;color:var(--ink-f);margin-top:1px;}
.gen-section{display:flex;gap:24px;align-items:flex-start;}
.gen-sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}
.selected-tag{padding:10px 12px;background:var(--gold-p);border:1px solid var(--border);font-size:13px;color:var(--ink-l);line-height:1.6;}
.selected-tag strong{color:var(--gold);display:block;font-size:14px;margin-bottom:2px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;color:var(--ink-l);}
.field input,.field textarea{background:var(--cream);border:1px solid var(--border);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:13px;padding:7px 10px;outline:none;width:100%;border-radius:0;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--gold);}
.field textarea{height:60px;resize:none;}
.tone-row{display:flex;gap:6px;}
.tone-btn{flex:1;font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:300;padding:6px 4px;border:1px solid var(--border);background:var(--cream);color:var(--ink-l);cursor:pointer;border-radius:0;transition:all .15s;}
.tone-btn.on{background:var(--gold-p);border-color:var(--gold);color:var(--ink);}
.gen-btn{width:100%;padding:11px;background:var(--ink);color:var(--cream);border:none;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:300;letter-spacing:.12em;cursor:pointer;transition:background .2s;border-radius:0;}
.gen-btn:hover{background:var(--gold);color:var(--ink);}
.gen-btn:disabled{background:var(--ink-f);cursor:not-allowed;}
.free-note{font-size:11px;color:var(--ink-f);text-align:center;line-height:1.6;}
.results{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 24px;border:1px dashed var(--border);color:var(--ink-f);gap:10px;}
.empty-state .ei{font-size:28px;opacity:.6;}
.empty-state p{font-size:13px;letter-spacing:.06em;text-align:center;line-height:1.6;}
.wish-card{background:var(--white);border:1px solid var(--border);padding:18px 20px;display:flex;flex-direction:column;gap:10px;}
.wish-card.locked{border-color:var(--gold);background:#FFFDF7;}
.card-top{display:flex;align-items:center;justify-content:space-between;}
.card-num{font-size:11px;letter-spacing:.14em;color:var(--ink-f);}
.card-actions{display:flex;gap:6px;align-items:center;}
.locked-tag{font-size:11px;color:var(--gold);padding:2px 7px;border:1px solid var(--gold-l);background:var(--gold-p);}
.action-btn{font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:300;padding:4px 9px;border:1px solid var(--border);background:transparent;color:var(--ink-l);cursor:pointer;transition:all .15s;border-radius:0;}
.action-btn:hover{border-color:var(--ink-l);color:var(--ink);}
.action-btn.lock-on{border-color:var(--gold);color:var(--gold);}
.action-btn.copied{border-color:#7A9E7E;color:#4A7A4E;background:#F0F5F0;}
.card-text{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:300;color:var(--ink);line-height:1.95;white-space:pre-wrap;letter-spacing:.04em;}
.divider{width:100%;height:1px;background:var(--border);}
.loading-card{background:var(--white);border:1px solid var(--border);padding:18px 20px;color:var(--ink-f);font-size:13px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.error-msg{padding:18px 20px;color:#9B4A3A;font-size:13px;border:1px solid #E8C4BC;background:#FDF5F3;line-height:1.7;white-space:pre-wrap;}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="eyebrow">Wish Generator</div>
    <h1>節日祝福產生器</h1>
    <div class="hline"></div>
  </div>

  <div class="top-section">
    <div class="cal-wrap">
      <div class="section-label">行 事 曆</div>
      <div class="cal-card">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-title" id="calTitle"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="holiday-popup" id="holidayPopup">點選日期查看節日</div>
    </div>
    <div class="search-wrap">
      <div class="section-label">節 日 選 擇</div>
      <div class="panel">
        <div class="panel-title">搜尋節日</div>
        <input class="search-input" type="text" id="searchInput" placeholder="輸入節日名稱或職業…" oninput="filterHolidays()"/>
        <div class="holiday-list" id="holidayList"></div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">產 生 祝 福</div>
    <div class="gen-section">
      <div class="gen-sidebar">
        <div class="selected-tag">
          <strong id="selName">尚未選擇節日</strong>
          <span id="selDate" style="font-size:11px;color:var(--ink-f)"></span>
        </div>
        <div class="panel">
          <div class="panel-title">背景資訊（選填）</div>
          <div class="field"><label>與對方的關係</label><input type="text" id="rel" placeholder="同事、朋友…"/></div>
          <div class="field"><label>個性或興趣</label><input type="text" id="trait" placeholder="愛喝咖啡…"/></div>
          <div class="field"><label>其他備註</label><textarea id="note" placeholder="換工作、剛升遷…"></textarea></div>
        </div>
        <div class="panel">
          <div class="panel-title">語氣</div>
          <div class="tone-row">
            <button class="tone-btn on" data-tone="輕鬆" onclick="setTone(this)">輕鬆</button>
            <button class="tone-btn" data-tone="溫馨" onclick="setTone(this)">溫馨</button>
            <button class="tone-btn" data-tone="搞笑" onclick="setTone(this)">搞笑</button>
          </div>
        </div>
        <button class="gen-btn" id="genbtn" onclick="generate()">產 生 五 個 版 本</button>
        <div class="free-note">✦ 完全免費 · 不需 API Key</div>
      </div>
      <div class="results" id="results">
        <div class="empty-state"><div class="ei">🎊</div><p>選擇節日後<br>按「產生五個版本」</p></div>
      </div>
    </div>
  </div>
</div>

  {name:'世界無菸日',date:'2026-05-31',cat:'國際節日',emoji:'🚭'},
  {name:'世界水日',date:'2026-03-22',cat:'國際節日',emoji:'💧'},
  {name:'世界氣象日',date:'2026-03-23',cat:'國際節日',emoji:'🌤️'},
  {name:'世界衛生日',date:'2026-04-07',cat:'國際節日',emoji:'🏥'},
  {name:'世界人口日',date:'2026-07-11',cat:'國際節日',emoji:'🌏'},
  {name:'國際和平日',date:'2026-09-21',cat:'國際節日',emoji:'☮️'},
  {name:'世界教師節',date:'2026-10-05',cat:'國際節日',emoji:'🍎'},
  {name:'世界糖尿病日',date:'2026-11-14',cat:'國際節日',emoji:'💙'},
];

// date → holidays map
var dateMap={};
HOLIDAYS.forEach(function(h){
  if(!dateMap[h.date]) dateMap[h.date]=[];
  dateMap[h.date].push(h);
});

// =====================================================
// STATE
// =====================================================
var now=new Date(), calYear=now.getFullYear(), calMonth=now.getMonth();
var selectedHoliday=null, currentTone='輕鬆';
var lockedCards={}, results=[], isLoading=false;
var MODELS=['google/gemini-3.5-flash','mistralai/mistral-small-2603','qwen/qwen3.6-flash','z-ai/glm-5.2'];
var DOW=['日','一','二','三','四','五','六'];
var MNAMES=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

// =====================================================
// CALENDAR
// =====================================================
function pad(n){return n<10?'0'+n:''+n;}

function renderCalendar(){
  document.getElementById('calTitle').textContent=calYear+'年 '+MNAMES[calMonth];
  var grid=document.getElementById('calGrid');
  grid.innerHTML='';
  DOW.forEach(function(d){var e=document.createElement('div');e.className='cal-dow';e.textContent=d;grid.appendChild(e);});
  var first=new Date(calYear,calMonth,1).getDay();
  var days=new Date(calYear,calMonth+1,0).getDate();
  var todayY=now.getFullYear(),todayM=now.getMonth(),todayD=now.getDate();
  for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(var d=1;d<=days;d++){
    var e=document.createElement('div');e.className='cal-day';
    var ds=calYear+'-'+pad(calMonth+1)+'-'+pad(d);
    if(todayY===calYear&&todayM===calMonth&&todayD===d) e.classList.add('today');
    if(dateMap[ds]){e.classList.add('has-holiday');var dot=document.createElement('span');dot.className='dot';e.appendChild(dot);}
    var num=document.createElement('span');num.textContent=d;e.appendChild(num);
    e.setAttribute('data-date',ds);
    e.addEventListener('click',function(){onDayClick(this.getAttribute('data-date'));});
    grid.appendChild(e);
  }
}

function onDayClick(ds){
  document.querySelectorAll('.cal-day').forEach(function(e){e.classList.remove('selected');});
  var el=document.querySelector('[data-date="'+ds+'"]');
  if(el) el.classList.add('selected');
  var popup=document.getElementById('holidayPopup');
  var hs=dateMap[ds];
  if(!hs){
    popup.innerHTML='<span style="color:var(--ink-f)">'+ds.replace(/-/g,'/')+'　今天沒有特別節日</span>';
  } else {
    popup.innerHTML=hs.map(function(h){
      return '<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">'+
        h.emoji+' <span class="hday-name">'+h.name+'</span>'+
        '<span style="font-size:11px;color:var(--ink-f);margin-left:4px;">'+h.cat+'</span>'+
        '<button class="use-btn" onclick="selectHoliday(\''+ea(h.name)+'\',\''+h.date+'\',\''+h.emoji+'\')">使用</button>'+
      '</div>';
    }).join('');
  }
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
  document.getElementById('holidayPopup').textContent='點選日期查看節日';
}

// =====================================================
// HOLIDAY SEARCH
// =====================================================
function ea(s){return s.replace(/'/g,"&#39;");}

function renderList(list){
  var el=document.getElementById('holidayList');
  if(!list.length){el.innerHTML='<div style="font-size:12px;color:var(--ink-f);padding:8px 10px;">找不到符合的節日</div>';return;}
  el.innerHTML=list.map(function(h){
    var sel=selectedHoliday&&selectedHoliday.name===h.name?' selected':'';
    return '<div class="hitem'+sel+'" onclick="selectHoliday(\''+ea(h.name)+'\',\''+h.date+'\',\''+h.emoji+'\')">'+
      h.emoji+' '+h.name+
      '<div class="hitem-date">'+h.cat+' · '+h.date.replace(/-/g,'/')+'</div>'+
    '</div>';
  }).join('');
}

function filterHolidays(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  renderList(q?HOLIDAYS.filter(function(h){return h.name.toLowerCase().includes(q)||h.cat.toLowerCase().includes(q);}):HOLIDAYS);
}

function selectHoliday(name,date,emoji){
  selectedHoliday={name:name,date:date,emoji:emoji};
  document.getElementById('selName').textContent=emoji+' '+name;
  document.getElementById('selDate').textContent=date.replace(/-/g,'/');
  filterHolidays();
  document.getElementById('results').innerHTML='<div class="empty-state"><div class="ei">'+emoji+'</div><p>已選擇「'+name+'」<br>按下方按鈕產生祝福</p></div>';
}

// =====================================================
// GENERATOR
// =====================================================
function setTone(btn){document.querySelectorAll('.tone-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');currentTone=btn.getAttribute('data-tone');}

function buildPrompt(){
  var rel=document.getElementById('rel').value.trim();
  var trait=document.getElementById('trait').value.trim();
  var note=document.getElementById('note').value.trim();
  var ctx='';
  if(rel) ctx+='與對方關係：'+rel+'\n';
  if(trait) ctx+='對方個性或興趣：'+trait+'\n';
  if(note) ctx+='其他備註：'+note+'\n';
  var hname=selectedHoliday?selectedHoliday.name:'節日';
  return '你是一個幫人寫節日祝福的助手。現在要寫的節日是「'+hname+'」。請產生5則祝福訊息。\n\n語氣要求：'+currentTone+'\n注意事項：\n- 不要太制式、不要像範本套用\n- 不要裝熟，保持一點點禮貌距離，像是傳給不太熟的朋友那種感覺\n- 不要用「願你」「祝你」這種起頭\n- 標點符號全部用空格代替，可以適時加入合適的emoji\n- 每則約2-4行，長短自然不一\n- 5則風格明顯不同\n- 請讓祝福內容符合「'+hname+'」的節日氛圍與意義\n'+(ctx?'\n對象背景：\n'+ctx+'\n請讓祝福更貼合這個人':'')+'\n\n請直接回傳JSON，不加說明文字或markdown：\n{"wishes":["第一則","第二則","第三則","第四則","第五則"]}';
}

function getText(r){
  if(typeof r==='string') return r;
  if(r&&r.message&&r.message.content) return r.message.content;
  if(r&&r.content) return r.content;
  if(r&&r.text) return r.text;
  return JSON.stringify(r);
}

async function tryModel(m,p){
  var r=await puter.ai.chat(p,{model:m});
  var t=getText(r);
  var c=t.replace(/```json|```/g,'').trim();
  var match=c.match(/\{[\s\S]*\}/);
  if(!match) throw new Error('格式錯誤');
  return JSON.parse(match[0]);
}

async function generate(){
  if(isLoading) return;
  if(!selectedHoliday){alert('請先選擇節日');return;}
  isLoading=true;
  var btn=document.getElementById('genbtn');
  btn.disabled=true;btn.textContent='生 成 中 …';
  var res=document.getElementById('results');
  var lt={};
  results.forEach(function(r,i){if(lockedCards[i]) lt[i]=r;});
  var html='';
  for(var i=0;i<5;i++) html+=lt[i]!==undefined?makeCard(i,lt[i],true):'<div class="loading-card">正在生成版本 '+(i+1)+' …</div>';
  res.innerHTML=html;
  var parsed=null,lastErr='',p=buildPrompt();
  for(var m=0;m<MODELS.length;m++){try{parsed=await tryModel(MODELS[m],p);break;}catch(e){lastErr=MODELS[m]+': '+e.message;}}
  if(parsed){
    results=parsed.wishes;lockedCards={};
    Object.keys(lt).forEach(function(i){results[i]=lt[i];lockedCards[i]=true;});
    renderCards();
  } else {
    res.innerHTML='<div class="error-msg">出了點問題\n'+esc(lastErr)+'</div>';
  }
  isLoading=false;btn.disabled=false;btn.textContent='產 生 五 個 版 本';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function makeCard(i,text,locked){
  return '<div class="wish-card'+(locked?' locked':'')+'">'+
    '<div class="card-top"><span class="card-num">NO. 0'+(i+1)+'</span>'+
    '<div class="card-actions">'+
      (locked?'<span class="locked-tag">已鎖定</span>':'')+
      '<button class="action-btn'+(locked?' lock-on':'')+'" onclick="toggleLock('+i+')">'+(locked?'解鎖':'鎖定')+'</button>'+
      '<button class="action-btn" id="cp'+i+'" onclick="copyText('+i+')">複製</button>'+
    '</div></div>'+
    '<div class="divider"></div>'+
    '<div class="card-text">'+esc(text)+'</div></div>';
}

function renderCards(){document.getElementById('results').innerHTML=results.map(function(t,i){return makeCard(i,t,!!lockedCards[i]);}).join('');}
function toggleLock(i){if(lockedCards[i]) delete lockedCards[i];else lockedCards[i]=true;renderCards();}
async function copyText(i){
  try{
    await navigator.clipboard.writeText(results[i]);
    var btn=document.getElementById('cp'+i);
    btn.classList.add('copied');btn.textContent='已複製';
    setTimeout(function(){btn.classList.remove('copied');btn.textContent='複製';},1800);
  }catch(e){}
}

// INIT
renderCalendar();
renderList(HOLIDAYS);
</script>
</body>
</html>
