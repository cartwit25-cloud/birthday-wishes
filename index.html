@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{--cream:#F5F0E8;--ink:#2C2416;--ink-l:#6B5E4A;--ink-f:#A8997E;--gold:#C4963A;--gold-l:#E8C97A;--gold-p:#F5EDD0;--border:#D9CEB8;--white:#FFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;padding:40px 20px;}
.page{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:32px;}
.header{text-align:center;}
.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.header h1{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:300;letter-spacing:.08em;}
.hline{width:36px;height:1px;background:var(--gold);margin:14px auto 0;}
.slabel{font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.top{display:flex;gap:24px;align-items:flex-start;}
.cal-wrap{flex:1;min-width:0;}
.cal-card{background:var(--white);border:1px solid var(--border);padding:20px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:400;letter-spacing:.06em;}
.cal-nav{background:transparent;border:1px solid var(--border);color:var(--ink-l);font-size:14px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-nav:hover{border-color:var(--gold);color:var(--gold);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:11px;color:var(--ink-f);text-align:center;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;border:1px solid transparent;transition:all .15s;}
.cal-day:hover{background:var(--gold-p);border-color:var(--border);}
.cal-day.today{font-weight:500;color:var(--gold);}
.cal-day.has-h .dot{width:4px;height:4px;background:var(--gold);border-radius:50%;position:absolute;bottom:3px;}
.cal-day.sel{background:var(--gold-p);border-color:var(--gold);}
.cal-day.empty{cursor:default;pointer-events:none;}
.popup{margin-top:12px;padding:12px 16px;background:var(--gold-p);border:1px solid var(--border);font-size:13px;color:var(--ink-l);line-height:1.8;min-height:44px;}
.hday{color:var(--gold);font-weight:500;}
.use-btn{padding:3px 9px;background:var(--ink);color:var(--cream);border:none;font-size:11px;cursor:pointer;margin-left:8px;font-family:'Noto Sans TC',sans-serif;}
.use-btn:hover{background:var(--gold);color:var(--ink);}
.sw{width:240px;flex-shrink:0;}
.panel{background:var(--white);border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:12px;}
.ptitle{font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;}
.si{background:var(--cream);border:1px solid var(--border);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:13px;padding:7px 10px;outline:none;width:100%;border-radius:0;transition:border-color .2s;}
.si:focus{border-color:var(--gold);}
.hlist{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.hlist::-webkit-scrollbar{width:4px;}
.hlist::-webkit-scrollbar-thumb{background:var(--border);}
.hitem{padding:7px 10px;font-size:13px;cursor:pointer;color:var(--ink-l);border:1px solid transparent;transition:all .12s;}
.hitem:hover{background:var(--gold-p);border-color:var(--border);color:var(--ink);}
.hitem.sel{background:var(--gold-p);border-color:var(--gold);color:var(--ink);}
.hitem-sub{font-size:11px;color:var(--ink-f);margin-top:1px;}
.gsec{display:flex;gap:24px;align-items:flex-start;}
.gsb{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}
.stag{padding:10px 12px;background:var(--gold-p);border:1px solid var(--border);font-size:13px;color:var(--ink-l);line-height:1.6;}
.stag strong{color:var(--gold);display:block;font-size:14px;margin-bottom:2px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;color:var(--ink-l);}
.field input,.field textarea{background:var(--cream);border:1px solid var(--border);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:13px;padding:7px 10px;outline:none;width:100%;border-radius:0;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--gold);}
.field textarea{height:60px;resize:none;}
.trow{display:flex;gap:6px;}
.tbtn{flex:1;font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:300;padding:6px 4px;border:1px solid var(--border);background:var(--cream);color:var(--ink-l);cursor:pointer;border-radius:0;transition:all .15s;}
.tbtn.on{background:var(--gold-p);border-color:var(--gold);color:var(--ink);}
.gbtn{width:100%;padding:11px;background:var(--ink);color:var(--cream);border:none;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:300;letter-spacing:.12em;cursor:pointer;transition:background .2s;border-radius:0;}
.gbtn:hover{background:var(--gold);color:var(--ink);}
.gbtn:disabled{background:var(--ink-f);cursor:not-allowed;}
.fnote{font-size:11px;color:var(--ink-f);text-align:center;line-height:1.6;}
.results{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 24px;border:1px dashed var(--border);color:var(--ink-f);gap:10px;}
.empty .ei{font-size:28px;opacity:.6;}
.empty p{font-size:13px;text-align:center;line-height:1.6;}
.wcard{background:var(--white);border:1px solid var(--border);padding:18px 20px;display:flex;flex-direction:column;gap:10px;}
.wcard.lk{border-color:var(--gold);background:#FFFDF7;}
.ctop{display:flex;align-items:center;justify-content:space-between;}
.cnum{font-size:11px;letter-spacing:.14em;color:var(--ink-f);}
.cacts{display:flex;gap:6px;align-items:center;}
.ltag{font-size:11px;color:var(--gold);padding:2px 7px;border:1px solid var(--gold-l);background:var(--gold-p);}
.abtn{font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:300;padding:4px 9px;border:1px solid var(--border);background:transparent;color:var(--ink-l);cursor:pointer;transition:all .15s;border-radius:0;}
.abtn:hover{border-color:var(--ink-l);color:var(--ink);}
.abtn.lo{border-color:var(--gold);color:var(--gold);}
.abtn.cp{border-color:#7A9E7E;color:#4A7A4E;background:#F0F5F0;}
.ctext{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:300;color:var(--ink);line-height:1.95;white-space:pre-wrap;letter-spacing:.04em;}
.div{width:100%;height:1px;background:var(--border);}
.lcard{background:var(--white);border:1px solid var(--border);padding:18px 20px;color:var(--ink-f);font-size:13px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.errmsg{padding:18px 20px;color:#9B4A3A;font-size:13px;border:1px solid #E8C4BC;background:#FDF5F3;line-height:1.7;white-space:pre-wrap;}
</style>

<body>
<div class="page">
  <div class="header">
    <div class="eyebrow">Wish Generator</div>
    <h1>節日祝福產生器</h1>
    <div class="hline"></div>
  </div>

  <div class="top">
    <div class="cal-wrap">
      <div class="slabel">行 事 曆</div>
      <div class="cal-card">
        <div class="cal-header">
          <button class="cal-nav" onclick="chM(-1)">&#8249;</button>
          <div class="cal-title" id="calTitle"></div>
          <button class="cal-nav" onclick="chM(1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="popup" id="popup">點選日期查看節日</div>
    </div>
    <div class="sw">
      <div class="slabel">節 日 選 擇</div>
      <div class="panel">
        <div class="ptitle">搜尋節日</div>
        <input class="si" type="text" id="q" placeholder="輸入節日名稱或職業…" oninput="filterH()"/>
        <div class="hlist" id="hlist"></div>
      </div>
    </div>
  </div>

  <div>
    <div class="slabel">產 生 祝 福</div>
    <div class="gsec">
      <div class="gsb">
        <div class="stag">
          <strong id="sname">尚未選擇節日</strong>
          <span id="sdate" style="font-size:11px;color:var(--ink-f)"></span>
        </div>
        <div class="panel">
          <div class="ptitle">背景資訊（選填）</div>
          <div class="field"><label>與對方的關係</label><input type="text" id="rel" placeholder="同事、朋友…"/></div>
          <div class="field"><label>個性或興趣</label><input type="text" id="trait" placeholder="愛喝咖啡…"/></div>
          <div class="field"><label>其他備註</label><textarea id="note" placeholder="換工作、剛升遷…"></textarea></div>
        </div>
        <div class="panel">
          <div class="ptitle">語氣</div>
          <div class="trow">
            <button class="tbtn on" data-t="輕鬆" onclick="setT(this)">輕鬆</button>
            <button class="tbtn" data-t="溫馨" onclick="setT(this)">溫馨</button>
            <button class="tbtn" data-t="搞笑" onclick="setT(this)">搞笑</button>
          </div>
        </div>
        <button class="gbtn" id="gbtn" onclick="gen()">產 生 五 個 版 本</button>
        <div class="fnote">完全免費 · 不需 API Key</div>
      </div>
      <div class="results" id="res">
        <div class="empty"><div class="ei">🎊</div><p>選擇節日後<br>按「產生五個版本」</p></div>
      </div>
    </div>
  </div>
</div>

// date map
var dm={};
H.forEach(function(h){if(!dm[h.d])dm[h.d]=[];dm[h.d].push(h);});

// state
var now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
var sel=null,tone='輕鬆',locked={},res=[],busy=false;
var MODELS=['google/gemini-3.5-flash','mistralai/mistral-small-2603','qwen/qwen3.6-flash','z-ai/glm-5.2'];
var DOW=['日','一','二','三','四','五','六'];
var MN=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

function pad(n){return n<10?'0'+n:''+n;}

function renderCal(){
  document.getElementById('calTitle').textContent=cy+'年 '+MN[cm];
  var g=document.getElementById('calGrid');g.innerHTML='';
  DOW.forEach(function(d){var e=document.createElement('div');e.className='cal-dow';e.textContent=d;g.appendChild(e);});
  var first=new Date(cy,cm,1).getDay(),days=new Date(cy,cm+1,0).getDate();
  var ty=now.getFullYear(),tm=now.getMonth(),td=now.getDate();
  for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cal-day empty';g.appendChild(e);}
  for(var d=1;d<=days;d++){
    var e=document.createElement('div');e.className='cal-day';
    var ds=cy+'-'+pad(cm+1)+'-'+pad(d);
    if(ty===cy&&tm===cm&&td===d)e.classList.add('today');
    if(dm[ds]){e.classList.add('has-h');var dot=document.createElement('span');dot.className='dot';e.appendChild(dot);}
    var num=document.createElement('span');num.textContent=d;e.appendChild(num);
    e.setAttribute('data-date',ds);
    e.addEventListener('click',function(){onDay(this.getAttribute('data-date'));});
    g.appendChild(e);
  }
}

function onDay(ds){
  document.querySelectorAll('.cal-day').forEach(function(e){e.classList.remove('sel');});
  var el=document.querySelector('[data-date="'+ds+'"]');
  if(el)el.classList.add('sel');
  var pop=document.getElementById('popup'),hs=dm[ds];
  if(!hs){pop.innerHTML='<span style="color:var(--ink-f)">'+ds.replace(/-/g,'/')+'&nbsp;&nbsp;今天沒有特別節日</span>';}
  else{pop.innerHTML=hs.map(function(h){return '<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">'+h.e+' <span class="hday">'+h.n+'</span><span style="font-size:11px;color:var(--ink-f);margin-left:4px;">'+h.c+'</span><button class="use-btn" onclick="pickH(\''+ea(h.n)+'\',\''+h.d+'\',\''+ea(h.e)+'\')">使用</button></div>';}).join('');}
}

function chM(dir){
  cm+=dir;
  if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}
  renderCal();
  document.getElementById('popup').textContent='點選日期查看節日';
}

function ea(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderList(list){
  var el=document.getElementById('hlist');
  if(!list.length){el.innerHTML='<div style="font-size:12px;color:var(--ink-f);padding:8px 10px;">找不到符合的節日</div>';return;}
  el.innerHTML=list.map(function(h){
    var s=sel&&sel.n===h.n?' sel':'';
    return '<div class="hitem'+s+'" onclick="pickH(\''+ea(h.n)+'\',\''+h.d+'\',\''+ea(h.e)+'\')">'+h.e+' '+h.n+'<div class="hitem-sub">'+h.c+' · '+h.d.replace(/-/g,'/')+'</div></div>';
  }).join('');
}

function filterH(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  renderList(q?H.filter(function(h){return h.n.toLowerCase().includes(q)||h.c.toLowerCase().includes(q);}):H);
}

function pickH(name,date,emoji){
  sel={n:name,d:date,e:emoji};
  document.getElementById('sname').textContent=emoji+' '+name;
  document.getElementById('sdate').textContent=date.replace(/-/g,'/');
  filterH();
  document.getElementById('res').innerHTML='<div class="empty"><div class="ei">'+emoji+'</div><p>已選擇「'+name+'」<br>按下方按鈕產生祝福</p></div>';
}

function setT(btn){document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');tone=btn.getAttribute('data-t');}

function buildPrompt(){
  var rel=document.getElementById('rel').value.trim();
  var trait=document.getElementById('trait').value.trim();
  var note=document.getElementById('note').value.trim();
  var ctx='';
  if(rel)ctx+='與對方關係：'+rel+'\n';
  if(trait)ctx+='對方個性或興趣：'+trait+'\n';
  if(note)ctx+='其他備註：'+note+'\n';
  var hn=sel?sel.n:'節日';
  return '你是一個幫人寫節日祝福的助手。現在要寫的節日是「'+hn+'」。請產生5則祝福訊息。\n\n語氣要求：'+tone+'\n注意事項：\n- 不要太制式、不要像範本套用\n- 不要裝熟，保持一點點禮貌距離，像是傳給不太熟的朋友那種感覺\n- 不要用「願你」「祝你」這種起頭\n- 標點符號全部用空格代替，可以適時加入合適的emoji\n- 每則約2-4行，長短自然不一\n- 5則風格明顯不同\n- 請讓祝福內容符合「'+hn+'」的節日氛圍與意義\n'+(ctx?'\n對象背景：\n'+ctx+'\n請讓祝福更貼合這個人':'')+'\n\n請直接回傳JSON，不加說明文字或markdown：\n{"wishes":["第一則","第二則","第三則","第四則","第五則"]}';
}

function getText(r){
  if(typeof r==='string')return r;
  if(r&&r.message&&r.message.content)return r.message.content;
  if(r&&r.content)return r.content;
  if(r&&r.text)return r.text;
  return JSON.stringify(r);
}

async function tryM(m,p){
  var r=await puter.ai.chat(p,{model:m});
  var t=getText(r);
  var c=t.replace(/```json|```/g,'').trim();
  var match=c.match(/\{[\s\S]*\}/);
  if(!match)throw new Error('格式錯誤');
  return JSON.parse(match[0]);
}

async function gen(){
  if(busy)return;
  if(!sel){alert('請先選擇節日');return;}
  busy=true;
  var btn=document.getElementById('gbtn');
  btn.disabled=true;btn.textContent='生 成 中 …';
  var resEl=document.getElementById('res');
  var lt={};
  res.forEach(function(r,i){if(locked[i])lt[i]=r;});
  var html='';
  for(var i=0;i<5;i++)html+=lt[i]!==undefined?mkCard(i,lt[i],true):'<div class="lcard">正在生成版本 '+(i+1)+' …</div>';
  resEl.innerHTML=html;
  var parsed=null,lastErr='',p=buildPrompt();
  for(var m=0;m<MODELS.length;m++){try{parsed=await tryM(MODELS[m],p);break;}catch(e){lastErr=MODELS[m]+': '+e.message;}}
  if(parsed){
    res=parsed.wishes;locked={};
    Object.keys(lt).forEach(function(i){res[i]=lt[i];locked[i]=true;});
    renderCards();
  }else{
    resEl.innerHTML='<div class="errmsg">出了點問題\n'+esc(lastErr)+'</div>';
  }
  busy=false;btn.disabled=false;btn.textContent='產 生 五 個 版 本';
}

function mkCard(i,text,lk){
  return '<div class="wcard'+(lk?' lk':'')+'"><div class="ctop"><span class="cnum">NO. 0'+(i+1)+'</span><div class="cacts">'+(lk?'<span class="ltag">已鎖定</span>':'')+'<button class="abtn'+(lk?' lo':'')+'" onclick="toggleLk('+i+')">'+(lk?'解鎖':'鎖定')+'</button><button class="abtn" id="cp'+i+'" onclick="cpText('+i+')">複製</button></div></div><div class="div"></div><div class="ctext">'+esc(text)+'</div></div>';
}

function renderCards(){document.getElementById('res').innerHTML=res.map(function(t,i){return mkCard(i,t,!!locked[i]);}).join('');}
function toggleLk(i){if(locked[i])delete locked[i];else locked[i]=true;renderCards();}
async function cpText(i){
  try{
    await navigator.clipboard.writeText(res[i]);
    var b=document.getElementById('cp'+i);b.classList.add('cp');b.textContent='已複製';
    setTimeout(function(){b.classList.remove('cp');b.textContent='複製';},1800);
  }catch(e){}
}

renderCal();
renderList(H);
</script>
